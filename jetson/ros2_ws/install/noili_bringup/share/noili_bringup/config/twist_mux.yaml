# config/twist_mux.yaml
/**:
  ros__parameters:
    topics:
      # 🔥 최우선: 대화중 정지
      - name: chatting
        topic: /cmd_vel_is_chatting
        timeout: 0.3
        priority: 100
      
      # 🚨 2순위: 안전 회피
      - name: safety
        topic: /cmd_vel_safety
        timeout: 0.3
        priority: 80
      
      # 👤 3순위: 사람 추적
      - name: person
        topic: /cmd_vel_person
        timeout: 0.3
        priority: 50
      
      # 🗺️ 4순위: 자율주행 (Nav2)
      - name: navigation
        topic: /cmd_vel
        timeout: 0.3
        priority: 10
    
    locks: []
