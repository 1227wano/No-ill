# config/sensors.yaml
/**:
  ros__parameters:
    # YDLIDAR 설정
    lidar:
      port: "/dev/ydlidar"
      baudrate: 128000
      frame_id: "laser_frame"
      angle_min: -3.14159
      angle_max: 3.14159
      range_min: 0.1
      range_max: 12.0
      frequency: 8.0
    
    # rf2o 오도메트리 설정
    rf2o:
      laser_scan_topic: "/scan"
      odom_topic: "/odom"
      base_frame_id: "base_link"
      odom_frame_id: "odom"
      publish_tf: true
      freq: 20.0
