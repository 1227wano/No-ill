stages:
  - lint
  - test
  - build
  - docker
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

lint:
  stage: lint
  image: node:20-alpine
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm run lint

security:
  stage: lint
  image: node:20-alpine
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm audit --audit-level=high
  allow_failure: true

test:
  stage: test
  image: node:20-alpine
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

build:
  stage: build
  image: node:20-alpine
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - display/dist/
    expire_in: 1 hour

docker:
  stage: docker
  image: docker:latest
  only:
    - display
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - >-
      docker build
      --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL
      --build-arg VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
      --build-arg VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
      --build-arg VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
      --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
      --build-arg VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
      --build-arg VITE_FIREBASE_VAPID_KEY=$VITE_FIREBASE_VAPID_KEY
      --build-arg VITE_WS_URL=$VITE_WS_URL
      -t $IMAGE_TAG ./display
    - docker push $IMAGE_TAG

deploy:
  stage: deploy
  image: alpine:latest
  only:
    - display
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$DISPLAY_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key && ssh-add ~/.ssh/deploy_key
    - echo "$DISPLAY_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  parallel:
    matrix:
      - SERVER: ["$DISPLAY_SERVER_1", "$DISPLAY_SERVER_2"]
  script:
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "/opt/homebrew/bin/docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "/opt/homebrew/bin/docker pull $IMAGE_TAG"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "/opt/homebrew/bin/docker stop display || true"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "/opt/homebrew/bin/docker rm display || true"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "/opt/homebrew/bin/docker run -d --name display -p 3002:80 $IMAGE_TAG"
    - sleep 5
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "curl -f http://localhost:3002 --retry 3 --retry-delay 5 || exit 1"