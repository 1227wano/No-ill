stages:
  - lint
  - test
  - build
  - docker
  - deploy


variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

.gradle_setup: &gradle_setup
  image: eclipse-temurin:21-jdk-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - server/.gradle/
  before_script:
    - cd server
    - chmod +x ./gradlew

.default_rules: &default_rules
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH



lint:
  <<: *gradle_setup
  <<: *default_rules
  stage: lint
  script:
    - ./gradlew check -x test


security:
  <<: *gradle_setup
  <<: *default_rules
  stage: lint
  script:
    - ./gradlew dependencyCheckAnalyze || true
  allow_failure: true


test:
  <<: *gradle_setup
  <<: *default_rules
  stage: test
  variables:
    SPRING_PROFILES_ACTIVE: test
  script:
    - cp $FIREBASE_KEY_JSON src/main/resources/firebase-service-account.json
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit: server/build/test-results/test/*.xml


build:
  <<: *gradle_setup
  <<: *default_rules
  stage: build
  script:
    - ./gradlew clean build -x test


docker:
  stage: docker
  image: docker:latest
  only:
    - server
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use --name multiarch --driver docker-container --bootstrap || docker buildx use multiarch
  script:
    - docker buildx build
      --platform linux/amd64
      --tag $IMAGE_TAG
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE:buildcache
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE:buildcache,mode=max
      --push
      ./server


deploy:
  stage: deploy
  image: alpine:latest
  only:
    - server
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SERVER_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key && ssh-add ~/.ssh/deploy_key
    - echo "$SERVER_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  variables:
    SERVER: "$SERVER_HOST_2"
    PORT: "8080"
  script:
    - |
      ssh $SERVER_DEPLOY_USER@$SERVER << EOF
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker pull $IMAGE_TAG
        docker stop server || true && docker rm server || true
        docker run -d --name server \
        --add-host=host.docker.internal:host-gateway \
        -p $PORT:$PORT \
        -e SERVER_PORT=$PORT \
        --env-file /opt/server/.env \
        -v /opt/server/firebase-service-account.json:/config/firebase-service-account.json:ro \
        -v /home/ubuntu/images:/app/images \
        -e SERVER_URL="http://$SERVER:8080" \
        -e FILE_DIR="/app/images/" \
        -e TZ=Asia/Seoul \
        $IMAGE_TAG
      sleep 30
      curl -f http://localhost:$PORT/actuator/health \
        --retry 5 --retry-delay 10 --retry-all-errors
      EOF
