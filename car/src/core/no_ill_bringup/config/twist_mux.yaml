# Twist Multiplexer 설정
#
# 다중 속도 명령 소스를 우선순위 기반으로 선택하여 단일 출력(/cmd_vel_out)으로 전달합니다.
#
# 우선순위 시스템:
#   - 높은 숫자 = 높은 우선순위 (0~255)
#   - 동일 시간에 여러 토픽이 활성화되면 우선순위가 높은 것이 선택됨
#   - timeout 내에 메시지가 없으면 다음 우선순위로 자동 전환
#
# 현재 우선순위 체계:
#   1. chatting (300) - 대화 중: 로봇 정지 (최우선)
#   2. safety (200)   - 긴급 회피: 장애물 감지 시 회피 동작
#   3. person (50)    - 사람 감지: 정지/추종 모드
#   4. navigation (10) - 자율 주행: Nav2 경로 추종 (기본)

twist_mux:
  ros__parameters:
    # 출력 발행 주기 (Hz)
    publish_rate: 20.0

    # 입력 토픽 목록
    topics:
      # ==========================================
      # 1. 대화 중 정지 (최우선)
      # ==========================================
      chatting:
        topic: cmd_vel_is_chatting      # 대화 중일 때 정지 명령 (0, 0, 0)
        timeout: 0.3                    # 300ms 내에 메시지 없으면 비활성화
        priority: 300                   # 최고 우선순위

      # ==========================================
      # 2. 안전 오버라이드 (긴급 회피)
      # ==========================================
      safety:
        topic: cmd_vel_safety           # 장애물 감지 시 회피 명령
        timeout: 0.3                    # 300ms 타임아웃
        priority: 200                   # 두 번째 우선순위

      # ==========================================
      # 3. 사람 감지 (정지/추종)
      # ==========================================
      person:
        topic: cmd_vel_person           # 사람 감지 시 정지/추종 명령
        timeout: 0.3                    # 300ms 타임아웃
        priority: 50                    # 세 번째 우선순위

      # ==========================================
      # 4. 자율 주행 (기본 모드)
      # ==========================================
      navigation:
        topic: cmd_vel                  # Nav2에서 발행하는 기본 속도 명령
        timeout: 0.3                    # 300ms 타임아웃
        priority: 10                    # 가장 낮은 우선순위 (기본값)

    # 참고:
    # - 모든 timeout이 0.3초로 동일 → 빠른 응답성 확보
    # - 출력 토픽: /cmd_vel_out (twist_mux가 자동 발행)
    # - 각 노드는 자신의 우선순위 토픽에만 발행
