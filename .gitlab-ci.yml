stages:
  - lint
  - test
  - build
  - docker
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

lint:
  stage: lint
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm run lint

security:
  stage: lint
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm audit --audit-level=high
  allow_failure: true

test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

build:
  stage: build
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - display/node_modules/
  before_script:
    - cd display
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - display/dist/
    expire_in: 1 hour

docker:
  stage: docker
  image: docker:latest
  only:
    - display
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG ./display
    - docker push $IMAGE_TAG

deploy:
  stage: deploy
  image: alpine:latest
  only:
    - display
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "=== DEBUG: Variable length ==="
    - echo "$DISPLAY_SSH_PRIVATE_KEY" | wc -c
    - echo "=== DEBUG: First 50 chars ==="
    - echo "$DISPLAY_SSH_PRIVATE_KEY" | head -c 50
    - echo ""
    - echo "=== DEBUG: Decoded key start ==="
    - echo "$DISPLAY_SSH_PRIVATE_KEY" | base64 -d | head -n 1
    - echo "$DISPLAY_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-add ~/.ssh/deploy_key
    - echo "$DISPLAY_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  parallel:
    matrix:
      - SERVER: ["$DISPLAY_SERVER_1", "$DISPLAY_SERVER_2"]
  script:
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "docker pull $IMAGE_TAG"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "docker stop display || true"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "docker rm display || true"
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "docker run -d --name display -p 80:80 $IMAGE_TAG"
    - sleep 5
    - ssh $DISPLAY_DEPLOY_USER@$SERVER "curl -f http://localhost:80 --retry 3 --retry-delay 5 || exit 1"
