stages:
  - build
  - deploy

# 1. 빌드 (CI)
flutter_build:
  stage: build
  image: ghcr.io/cirruslabs/flutter:stable
  script:
    - cd noill_app
    - flutter pub get
    - flutter build web --release --no-tree-shake-icons --no-wasm-dry-run --worker=1
  artifacts: # 👈 보물 상자에 빌드 결과물을 담는 과정입니다.
    paths:
      - noill_app/build/web/

# 2. 배포 (CD)
server_deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    # 1. 서버에 temp_build 폴더가 없을 수도 있으니 미리 만듭니다.
    - ssh ubuntu@$SERVER_IP "mkdir -p /home/ubuntu/temp_build"
    # 2. 파일 전송
    - scp -r noill_app/build/web/* ubuntu@$SERVER_IP:/home/ubuntu/temp_build/
    # 3. 실전 배치
    - ssh ubuntu@$SERVER_IP "sudo rm -rf /var/www/html/* && sudo cp -r /home/ubuntu/temp_build/* /var/www/html/ && sudo rm -rf /home/ubuntu/temp_build && sudo systemctl restart nginx"
  only:
    - master
    - app
