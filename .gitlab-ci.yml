stages:
  - build
  - deploy

# 1. 빌드 (CI)
flutter_build:
  stage: build
  image: ghcr.io/cirruslabs/flutter:stable
  script:
    - cd noill_app
    - flutter pub get
    - flutter build web --release --no-tree-shake-icons --no-wasm-dry-run
  artifacts: # 👈 보물 상자에 빌드 결과물을 담는 과정입니다.
    paths:
      - noill_app/build/web/

# 2. 배포 (CD)
server_deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    # 1. SSH 폴더가 없다면 생성
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # 2. 변수 내용을 파일로 직접 쓰고, 불필요한 공백과 줄바꿈 정리
    - echo "$SERVER_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    # 3. 파일로부터 열쇠 등록
    - ssh-add ~/.ssh/id_rsa
    - echo -e "$SERVER_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - ssh -o StrictHostKeyChecking=no $SERVER_DEPLOY_USER@$SERVER_HOST_2 "mkdir -p /home/$SERVER_DEPLOY_USER/temp_build"
    
    - scp -o StrictHostKeyChecking=no -r noill_app/build/web/* $SERVER_DEPLOY_USER@$SERVER_HOST_2:/home/$SERVER_DEPLOY_USER/temp_build/
    
    # 💡 sudo를 모두 빼고, 정적 파일 배포이므로 Nginx 재시작(restart)도 뺍니다. (파일만 바뀌면 바로 반영됩니다.)
    - ssh -o StrictHostKeyChecking=no $SERVER_DEPLOY_USER@$SERVER_HOST_2 "rm -rf /var/www/html/* && cp -r /home/$SERVER_DEPLOY_USER/temp_build/* /var/www/html/ && rm -rf /home/$SERVER_DEPLOY_USER/temp_build"
  only:
    - app
