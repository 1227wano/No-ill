stages:
  - build
  - deploy

# 1. 빌드 (CI)
flutter_build:
  stage: build
  image: ghcr.io/cirruslabs/flutter:stable
  script:
    - cd noill_app
    - flutter pub get
    - flutter build web --release --no-tree-shake-icons --no-wasm-dry-run
  artifacts: # 👈 보물 상자에 빌드 결과물을 담는 과정입니다.
    paths:
      - noill_app/build/web/

# 2. 배포 (CD)
server_deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    # 1. SSH 폴더가 없다면 생성
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # 2. 변수 내용을 파일로 직접 쓰고, 불필요한 공백과 줄바꿈 정리
    - echo "$SERVER_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    # 3. 파일로부터 열쇠 등록
    - ssh-add ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    # 💡 ubuntu 대신 $SERVER_DEPLOY_USER 를 사용하고, $SERVER_IP 대신 $SERVER_HOST_2(또는 백엔드 변수)를 써보세요.
    - ssh $SERVER_DEPLOY_USER@$SERVER_IP "mkdir -p /home/$SERVER_DEPLOY_USER/temp_build"
    
    # 💡 파일 전송 시에도 계정명을 변수로 바꿉니다.
    - scp -r noill_app/build/web/* $SERVER_DEPLOY_USER@$SERVER_IP:/home/$SERVER_DEPLOY_USER/temp_build/
    
    # 💡 실전 배치 명령어에서도 계정명을 수정합니다.
    - ssh $SERVER_DEPLOY_USER@$SERVER_IP "sudo rm -rf /var/www/html/* && sudo cp -r /home/$SERVER_DEPLOY_USER/temp_build/* /var/www/html/ && sudo rm -rf /home/$SERVER_DEPLOY_USER/temp_build && sudo systemctl restart nginx"
  only:
    - app
